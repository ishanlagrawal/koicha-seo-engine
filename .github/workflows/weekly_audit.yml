name: Koicha Weekly SEO Audit

on:
  schedule:
    - cron: '0 9 * * 1' # Every Monday at 9:00 AM UTC
  workflow_dispatch: # Allows manual trigger

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run SEO Pulse & Competitor Spy
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          KOICHA_SHEET_ID: ${{ secrets.KOICHA_SHEET_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          set -e
          export PYTHONPATH=$PYTHONPATH:.
          echo "🏁 Starting Weekly Strategic Audit..."
          
          echo "🔍 Scanning SEO Pulse..."
          python modules/seo_pulse.py
          
          echo "🕵️ Running Competitor Spy..."
          python modules/competitor_monitor.py
          
          echo "🏗️ Re-building Artisan Site..."
          python modules/site_builder.py
          
          echo "✅ Weekly Audit Complete."
