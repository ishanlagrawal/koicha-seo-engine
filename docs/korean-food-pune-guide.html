  <script>
    // Reveal Observer for Premium Transitions
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('revealed');
        }
      });
    }, { threshold: 0.1 });

    document.querySelectorAll('section, .menu-card, .review-card, .menu-item-card').forEach(el => {
      el.setAttribute('data-reveal', '');
      observer.observe(el);
    });
